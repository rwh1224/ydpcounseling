<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 사회정서 동아리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 550px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        .record-list { max-height: 350px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; padding: 10px; border-radius: 10px; background: #fdfdfd; }
        .record-item { background: white; border: 1px solid #eee; border-left: 5px solid #0d6efd; margin-bottom: 10px; padding: 15px; border-radius: 8px; }
        .score-badge { background: #e7f1ff; color: #0d6efd; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">🧠 AI 사회정서 동아리</h2>

    <div id="page-login">
        <div class="mb-3">
            <label class="form-label fw-bold">이름(또는 학번)</label>
            <input type="text" id="userId" class="form-control form-control-lg">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">비밀번호</label>
            <input type="password" id="userPw" class="form-control form-control-lg">
        </div>
        <button onclick="login()" id="loginBtn" class="btn btn-primary btn-lg w-100">접속하기</button>
    </div>

    <div id="page-main" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 fw-bold"><span id="displayName" class="text-primary"></span>님</h5>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">로그아웃</button>
        </div>

        <ul class="nav nav-pills nav-fill mb-4">
            <li class="nav-item">
                <button class="nav-link active" id="tab-write" onclick="showTab('write')">2. 기록하기</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-effect" onclick="showTab('effect')">3. 효과성 파악</button>
            </li>
        </ul>

        <div id="section-write">
            <div class="card p-3 mb-4 border-0 bg-light">
                <div class="mb-2 small fw-bold text-secondary">오늘의 마음 기록</div>
                <textarea id="issue" class="form-control mb-2" rows="2" placeholder="현재 고민"></textarea>
                <textarea id="want" class="form-control mb-2" rows="2" placeholder="원하는 변화"></textarea>
                <textarea id="action" class="form-control mb-3" rows="2" placeholder="내가 할 일"></textarea>
                <button onclick="submitData()" id="saveBtn" class="btn btn-success w-100">저장하기</button>
            </div>
            <h6 class="fw-bold">나의 성장 타임라인</h6>
            <div id="recordList" class="record-list"></div>
        </div>

        <div id="section-effect" class="hidden">
            <div class="alert alert-primary small">실천한 일을 체크하고 점수(1~5점)를 매겨보세요!</div>
            <div id="effectList" class="record-list"></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 이미 배포하신 URL이 적용되어 있습니다.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzw-VWTlIDDROPYQpfbj6JXOofR5US3k1Ev4b1ZBXrIyZZrvviLI2gQ7W4zDpxWhkRR2w/exec";

    let currentRecords = [];

    async function login() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        if(!id || !pw) return alert("정보를 입력하세요.");

        try {
            const response = await fetch(`${GAS_URL}?id=${id}&pw=${pw}&type=select`);
            const data = await response.json();
            if (data.error) {
                alert("인증 실패!");
            } else {
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-main').classList.remove('hidden');
                document.getElementById('displayName').innerText = id;
                currentRecords = data;
                displayRecords();
                displayEffectList();
            }
        } catch (e) { alert("연동 오류!"); }
    }

    function showTab(tab) {
        if(tab === 'write') {
            document.getElementById('section-write').classList.remove('hidden');
            document.getElementById('section-effect').classList.add('hidden');
            document.getElementById('tab-write').classList.add('active');
            document.getElementById('tab-effect').classList.remove('active');
        } else {
            document.getElementById('section-write').classList.add('hidden');
            document.getElementById('section-effect').classList.remove('hidden');
            document.getElementById('tab-write').classList.remove('active');
            document.getElementById('tab-effect').classList.add('active');
            displayEffectList();
        }
    }

    function displayRecords() {
        const listDiv = document.getElementById('recordList');
        listDiv.innerHTML = currentRecords.length ? "" : "<p class='text-center small py-3'>기록이 없습니다.</p>";
        currentRecords.forEach(item => {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `<div class="small text-muted">${item.date}</div>
                             <div class="mb-1"><strong>고민:</strong> ${item.issue}</div>
                             <strong>할일:</strong> ${item.action} 
                             ${item.score ? `<span class="score-badge">${item.score}점</span>` : ''}`;
            listDiv.appendChild(div);
        });
    }

    function displayEffectList() {
        const listDiv = document.getElementById('effectList');
        listDiv.innerHTML = "";
        
        currentRecords.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <div class="small text-muted mb-1">${item.date}</div>
                <div class="fw-bold mb-2">실천: ${item.action}</div>
                <div class="d-flex align-items-center gap-2">
                    <input type="number" id="score-${index}" class="form-control form-control-sm" style="width:70px" min="1" max="5" value="${item.score || ''}" placeholder="1~5">
                    <button onclick="saveScore('${item.action}', ${index})" class="btn btn-sm btn-primary">평가완료</button>
                </div>
            `;
            listDiv.appendChild(div);
        });
    }

    async function saveScore(actionText, idx) {
        const score = document.getElementById(`score-${idx}`).value;
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        if(!score || score < 1 || score > 5) return alert("1~5점 사이로 입력하세요.");

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ id, pw, action: actionText, score: score, type: 'updateScore' })
            });
            alert("점수가 전송되었습니다! (잠시 후 반영됩니다)");
            setTimeout(login, 1500); // 데이터 갱신을 위해 재로그인 로직 실행
        } catch (e) { alert("저장 실패"); }
    }

    // [중요] 기록 저장 함수 완성
    async function submitData() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        const issue = document.getElementById('issue').value;
        const want = document.getElementById('want').value;
        const action = document.getElementById('action').value;
        const saveBtn = document.getElementById('saveBtn');

        if(!issue || !want || !action) return alert("내용을 모두 입력해주세요.");

        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ id, pw, issue, want, action, type: 'insert' })
            });
            
            alert("기록이 전송되었습니다!");
            document.getElementById('issue').value = "";
            document.getElementById('want').value = "";
            document.getElementById('action').value = "";
            
            // 데이터 갱신
            setTimeout(login, 1500);
        } catch (e) {
            alert("통신 오류가 발생했습니다.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "저장하기";
        }
    }
</script>

</body>
</html>
