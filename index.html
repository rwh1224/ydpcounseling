<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 사회정서 동아리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .record-list { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #fafafa; }
        .record-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .record-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">🧠 AI 사회정서 동아리</h2>
    
    <div id="login-section">
        <div class="mb-3">
            <label class="form-label">이름(또는 학번)</label>
            <input type="text" id="userId" class="form-control" placeholder="이름을 입력하세요">
        </div>
        <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" id="userPw" class="form-control" placeholder="비밀번호를 입력하세요">
        </div>
        <button onclick="loadMyRecords()" class="btn btn-primary w-100">내 기록 확인하기</button>
    </div>

    <hr class="my-4">

    <div id="input-section">
        <div class="mb-3">
            <label class="form-label">1. 나의 현재 고민</label>
            <textarea id="issue" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">2. 무엇을 원하는지</label>
            <textarea id="want" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">3. 내가 지금 뭘 해야하는지</label>
            <textarea id="action" class="form-control" rows="2"></textarea>
        </div>
        <button onclick="submitData()" class="btn btn-success w-100">기록 저장하기</button>
    </div>

    <hr class="my-4">

    <h4>나의 기록 목록</h4>
    <div id="recordList" class="record-list">
        <p class="text-muted text-center">로그인 후 기록을 불러올 수 있습니다.</p>
    </div>
</div>

<script>
    // ⚠️ 나중에 Google Apps Script를 배포한 후 아래 URL을 수정해야 합니다.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwaQH3siRAFIBuc11SFgT2tyFlCiMpgwokAqmoOHvvYZ5CQWOQiKQlKC-sMJqiCYrXkBg/exec";

    // 1. 데이터 저장 함수
    async function submitData() {
        const data = {
            id: document.getElementById('userId').value,
            pw: document.getElementById('userPw').value,
            issue: document.getElementById('issue').value,
            want: document.getElementById('want').value,
            action: document.getElementById('action').value,
            type: 'insert'
        };

        if(!data.id || !data.pw) return alert("이름과 비밀번호를 입력해주세요.");

        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if(result.success) {
            alert("저장되었습니다!");
            loadMyRecords(); // 저장 후 목록 새로고침
        }
    }

    // 2. 과거 기록 불러오기 함수
    async function loadMyRecords() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        
        const response = await fetch(`${GAS_URL}?id=${id}&pw=${pw}&type=select`);
        const records = await response.json();

        const listDiv = document.getElementById('recordList');
        listDiv.innerHTML = "";

        if(records.length === 0) {
            listDiv.innerHTML = "<p class='text-center'>기록이 없습니다.</p>";
            return;
        }

        records.forEach(item => {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <small class="text-primary">${item.date}</small><br>
                <strong>고민:</strong> ${item.issue}<br>
                <strong>희망:</strong> ${item.want}<br>
                <strong>할일:</strong> ${item.action}
            `;
            listDiv.appendChild(div);
        });
    }
</script>

</body>
</html>
