<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 사회정서 동아리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 550px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        .record-list { max-height: 350px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; padding: 10px; border-radius: 10px; background: #fdfdfd; }
        .record-item { background: white; border: 1px solid #eee; border-left: 5px solid #0d6efd; margin-bottom: 10px; padding: 15px; border-radius: 8px; }
        .btn-lg { border-radius: 12px; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">🧠 AI 사회정서 동아리</h2>

    <div id="page-login">
        <div class="text-center mb-4 text-muted">등록된 정보를 입력하여 접속하세요.</div>
        <div class="mb-3">
            <label class="form-label fw-bold">이름(또는 학번)</label>
            <input type="text" id="userId" class="form-control form-control-lg" placeholder="이름을 입력하세요">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">비밀번호</label>
            <input type="password" id="userPw" class="form-control form-control-lg" placeholder="비밀번호를 입력하세요">
        </div>
        <button onclick="login()" id="loginBtn" class="btn btn-primary btn-lg w-100">내 기록 확인하러 가기</button>
    </div>

    <div id="page-main" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-bold"><span id="displayName" class="text-primary"></span>님의 페이지</h5>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">로그아웃</button>
        </div>

        <div class="card p-3 mb-4 border-0 bg-light">
            <div class="mb-3">
                <label class="form-label fw-bold small">1. 나의 현재 고민</label>
                <textarea id="issue" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">2. 무엇을 원하는지</label>
                <textarea id="want" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">3. 내가 지금 뭘 해야하는지</label>
                <textarea id="action" class="form-control" rows="2"></textarea>
            </div>
            <button onclick="submitData()" id="saveBtn" class="btn btn-success w-100">오늘의 기록 저장하기</button>
        </div>

        <h6 class="fw-bold">이전 나의 기록</h6>
        <div id="recordList" class="record-list">
            <p class="text-center text-muted small">기록을 불러오는 중...</p>
        </div>
    </div>
</div>

<script>
    // ⚠️ 수정하신 Apps Script URL이 정상적으로 들어가 있습니다.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyJ_E9mbTmVpjK65FfktoKqXciNY2mpFOrns52c1ktTLr5C_9Fk6REYEDykicHFSM5ZgA/exec";

    // 로그인 및 데이터 불러오기
    async function login() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        const loginBtn = document.getElementById('loginBtn');

        if(!id || !pw) return alert("아이디와 비밀번호를 모두 입력해주세요.");

        loginBtn.disabled = true;
        loginBtn.innerText = "인증 및 데이터 로딩 중...";

        try {
            const response = await fetch(`${GAS_URL}?id=${id}&pw=${pw}&type=select`);
            const data = await response.json();

            if (data.error) {
                alert("인증에 실패했습니다. 정보를 확인하세요.");
                loginBtn.disabled = false;
                loginBtn.innerText = "내 기록 확인하러 가기";
            } else {
                // 로그인 성공 시 화면 전환
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-main').classList.remove('hidden');
                document.getElementById('displayName').innerText = id;
                displayRecords(data);
            }
        } catch (e) {
            alert("연동 오류가 발생했습니다. Apps Script 배포 설정을 확인하세요.");
            loginBtn.disabled = false;
            loginBtn.innerText = "내 기록 확인하러 가기";
        }
    }

    // 기록 저장
    async function submitData() {
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;
        const issue = document.getElementById('issue').value;
        const want = document.getElementById('want').value;
        const action = document.getElementById('action').value;
        const saveBtn = document.getElementById('saveBtn');

        if(!issue || !want || !action) return alert("내용을 모두 입력해주세요.");

        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ id, pw, issue, want, action, type: 'insert' })
            });
            const result = await response.json();
            
            if(result.success) {
                alert("기록이 저장되었습니다!");
                document.getElementById('issue').value = "";
                document.getElementById('want').value = "";
                document.getElementById('action').value = "";
                
                // 저장 후 최신 목록 다시 불러오기
                const refreshResp = await fetch(`${GAS_URL}?id=${id}&pw=${pw}&type=select`);
                const refreshedData = await refreshResp.json();
                displayRecords(refreshedData);
            }
        } catch (e) {
            alert("저장에 실패했습니다.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "오늘의 기록 저장하기";
        }
    }

    // 화면에 기록 뿌려주기
    function displayRecords(records) {
        const listDiv = document.getElementById('recordList');
        listDiv.innerHTML = "";

        if(records.length === 0) {
            listDiv.innerHTML = "<p class='text-center text-muted small mt-3'>기록이 없습니다. 첫 기록을 남겨보세요!</p>";
            return;
        }

        records.forEach(item => {
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <div class="small text-muted mb-2">${item.date}</div>
                <div class="mb-1"><strong>고민:</strong> ${item.issue}</div>
                <div class="mb-1"><strong>원함:</strong> ${item.want}</div>
                <div><strong>할일:</strong> ${item.action}</div>
            `;
            listDiv.appendChild(div);
        });
    }
</script>

</body>
</html>
